name: Tests

on:
  push:
    branches: [ master, '*.x' ]
  pull_request:
    branches: [ master, '*.x' ]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  portable:
    runs-on: ubuntu-latest
    name: Portable Tests - PHP 8.3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            ~/.cache/composer/files
          key: composer-portable-${{ runner.os }}-8.3-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-portable-${{ runner.os }}-8.3-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run portable test suite
        run: vendor/bin/phpunit --exclude-group oci8

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - php: '8.3'
            stability: prefer-lowest
          - php: '8.3'
            stability: prefer-stable
          - php: '8.4'
            stability: prefer-stable
          - php: '8.5'
            stability: prefer-stable
      fail-fast: false

    name: PHP ${{ matrix.php }} - ${{ matrix.stability }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: oci8
          tools: composer

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            ~/.cache/composer/files
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ matrix.stability }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-${{ matrix.stability }}-

      - name: Install dependencies (prefer stable)
        if: matrix.stability == 'prefer-stable'
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install dependencies (prefer lowest)
        if: matrix.stability == 'prefer-lowest'
        run: composer update --prefer-lowest --prefer-stable --prefer-dist --no-progress --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit
