name: Lint with Laravel Pint

on:
  push:
    branches: [ master, '*.x' ]
  pull_request:
    branches: [ master, '*.x' ]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          fetch-depth: 0  # Needed for git diff if using --diff

      - name: Setup PHP
        uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5 # v2
        with:
          php-version: '8.3'  # Or use matrix if you want multi-version linting
          tools: composer

      - name: Cache Composer packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.composer/cache/files
            ~/.cache/composer/files
          key: composer-lint-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-lint-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run Laravel Pint (enforce style)
        run: ./vendor/bin/pint --test --verbose --dirty
