name: Monthly Coverage

on:
  schedule:
    - cron: '0 3 1 * *' 
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    name: PHP 8.3 - Coverage

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5 # v2
        with:
          php-version: '8.3'
          extensions: pcov, oci8
          coverage: pcov
          tools: composer

      - name: Cache Composer packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.composer/cache/files
            ~/.cache/composer/files
          key: composer-coverage-${{ runner.os }}-8.3-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-coverage-${{ runner.os }}-8.3-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run tests with coverage
        run: |
          vendor/bin/phpunit \
            --coverage-html coverage-report-php8.3 \
            --coverage-clover clover-php8.3.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: clover-php8.3.xml
          name: php8.3
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-php8.3
          path: |
            coverage-report-php8.3/
            clover-php8.3.xml
