name: Monthly Coverage

on:
  schedule:
    - cron: '0 3 1 * *' 
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    name: PHP 8.3 - Coverage

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pcov, oci8
          coverage: pcov
          tools: composer

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            ~/.cache/composer/files
          key: composer-coverage-${{ runner.os }}-8.3-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-coverage-${{ runner.os }}-8.3-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run tests with coverage
        run: |
          vendor/bin/phpunit \
            --coverage-html coverage-report-php8.3 \
            --coverage-clover clover-php8.3.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: clover-php8.3.xml
          name: php8.3
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-php8.3
          path: |
            coverage-report-php8.3/
            clover-php8.3.xml
